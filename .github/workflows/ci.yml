name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test imports
        run: |
          cd src
          python -c "from features import engineer_features, get_X_y, preprocessor; print('features.py OK')"

      - name: Test API startup
        run: |
          pip install httpx
          python -c "from api.schemas import PredictRequest, PredictResponse; print('schemas.py OK')"